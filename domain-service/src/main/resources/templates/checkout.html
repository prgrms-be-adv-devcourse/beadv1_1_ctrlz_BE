<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <base href="/" th:href="@{/}"/><script src="https://js.tosspayments.com/v2/standard"></script>
    <link rel="stylesheet" th:href="@{/modal-page.css}" />
    <title>결제 페이지</title>
    <link rel="icon" href="data:," />
</head>
<body>
<div class="wrapper">
    <!-- 상품 정보 -->
    <div class="product-section">
        <div class="product-info">
            <div class="product-details">
                <h2>[[ ${orderName} ]]</h2>
            </div>
        </div>

        <div class="product-price">
            <p class="price-original">₩<span id="original-amount">[[ ${amount} ]]</span></p>
            <p class="price-final">
                <span class="currency">₩</span> <span id="payPrice">[[ ${payPrice} ]]</span>
            </p>
        </div>
    </div>

    <!-- 결제 요약 -->
    <div class="product-summary">
        <div class="summary-row">
            <span class="summary-label">상품금액</span>
            <span class="summary-value" id="summary-amount">₩ [[ ${amount} ]]</span>
        </div>
        <div class="summary-row">
            <span class="summary-label">배송비</span>
            <span class="summary-value">무료</span>
        </div>
        <div class="summary-row total">
            <span class="summary-label">총 결제금액</span>
            <span class="summary-value" id="summary-payPrice">₩ [[ ${payPrice} ]]</span>
        </div>
    </div>

    <!-- 예치금 + 결제 UI -->
    <div class="box_section">
        <div class="deposit-section">
            <input type="checkbox" id="deposit-box" />
            <label for="deposit-box">
                예치금 사용 (보유 예치금: ₩ [[ ${depositBalance} ]])
            </label>
        </div>

        <!-- 결제 위젯 -->
        <div id="payment-method"></div>

        <!-- 이용약관 -->
        <div id="agreement"></div>

        <!-- 결제 버튼 -->
        <button class="button" id="payment-button" style="margin-top: 30px">
            결제하기
        </button>
    </div>
</div>



<script th:inline="javascript">
    const orderId = /*[[${orderId}]]*/ 'default-id';
    main();

    async  function main() {
        const deposit = document.getElementById("deposit-box");
        const button = document.getElementById("payment-button");

        let paymentWidget, paymentMethodWidget, userId, amount, depositBalance, orderName;

        <!-- 화면 금액 요소 -->
        const payPriceElem = document.getElementById("payPrice");
        const summaryPayPriceElem = document.getElementById("summary-payPrice");

        <!-- 서버에서 결제 준비 정보 불러오기 -->
        fetch(`/api/payments/ready/${orderId}`)
            .then(response => response.json())
            .then(data => {
                const info = data.data;
                userId = info.userId;
                amount = info.amount;
                depositBalance = info.depositBalance;
                orderName = info.orderName;

                console.log("결제 준비 데이터:", info);

                <!-- toss payments 위젯 설정 -->
                const widgetClientKey = "[[${@environment.getProperty('payment.toss.test_client_api_key')}]]";
                const paymentWidget = PaymentWidget(widgetClientKey, userId); // 회원 결제
                // const paymentWidget = PaymentWidget(widgetClientKey, PaymentWidget.ANONYMOUS) // 비회원 결제

                const paymentMethodWidget = paymentWidget.renderPaymentMethods(
                    "#payment-method",
                    { value: amount - depositBalance, currency: "KRW" },
                    { variantKey: "DEFAULT" }
                );

                <!-- 이용야관 렌더링 -->
                paymentWidget.renderAgreement(
                    "#agreement",
                    {variantKey: "AGREEMENT"}
                );

                <!-- 예치금 사용 체크 시 금액 변경 -->
                deposit.addEventListener("change", function () {
                    let newAmount = deposit.checked ? amount - depositBalance : amount;

                    <!-- 금액 업데이트 -->
                    payPriceElem.innerText = newAmount;
                    summaryPayPriceElem.innerText = newAmount;

                    <!-- 위젯 금액 업데이트 -->
                    paymentMethodWidget.updateAmount({ value: newAmount, currency: "KRW" });
                });
            })
            .catch(err => console.error("결제 준비 정보 불러오기 실패:", err));


        <!-- 결제 버튼 클릭 시 결제 요청 -->
        button.addEventListener("click", function () {
            if (!paymentWidget) {
                alert("결제 정보가 아직 준비되지 않았습니다.");
                return;
            }

            const depositUsed = deposit.checked;

            paymentWidget.requestPayment({
                orderId: orderId,
                orderName: orderName,
                amount: amount,
                successUrl: window.location.origin + "/payments/success?orderId=" + orderId,
                failUrl: window.location.origin + "/payments/fail?orderId=" + orderId,
                // customerEmail: "customer123@gmail.com",
                // customerName: "김토스",
                // customerMobilePhone: "01012341234",
            });
        });
    }
</script>
</body>
</html>
