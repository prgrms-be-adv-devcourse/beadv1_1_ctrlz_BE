<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8" />
</head>
<body>
<h2>결제 성공</h2>
<p id="paymentKey"></p>
<p id="orderId"></p>
<p id="amount"></p>

<script>
    // 쿼리 파라미터에서 결제 정보 추출
    const urlParams = new URLSearchParams(window.location.search);
    const paymentKey = urlParams.get("paymentKey");
    const orderId = urlParams.get("orderId");
    const amount = urlParams.get("amount");
    const depositUsed = urlParams.get("depositUsed") === 'true';
    const userId = localStorage.getItem("userId"); // 로그인 정보

    // 서버로 결제 승인 요청
    async function confirm() {
        const requestData = {
            userId: userId,
            paymentKey: paymentKey,
            orderId: orderId,
            amount: Number(amount),
            depositUsed: depositUsed
        };

        try {
            const response = await fetch("/api/payments/confirm", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(requestData),
            });

            const json = await response.json();

            if (!response.ok) {
                console.error("결제 승인 실패:", json);
                window.location.href = `/fail?message=${json.message}&code=${json.code}`;
                return;
            }

            console.log("결제 승인 성공:", json);
        } catch (error) {
            console.error("결제 승인 요청 중 오류 발생:", error);
            window.location.href = `/fail?message=${error.message}&code=NETWORK_ERROR`;
        }

        confirm();

        // 결제 정보 표시
        document.getElementById("orderId").textContent = "주문 번호: " + orderId;
        document.getElementById("amount").textContent = "결제 금액: " + amount + "원";
        document.getElementById("paymentKey").textContent = "결제 키: " + paymentKey;
    }

</script>
</body>
</html>
